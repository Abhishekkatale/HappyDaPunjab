<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Happy Da Punjab - Hotel Menu" />
  <title>Happy Da Punjab | Menu</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: #1a1209;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    header {
      background: linear-gradient(135deg, #1a1209 0%, #2d2010 100%);
      border-bottom: 2px solid rgba(201, 168, 76, 0.35);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-circle {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, #c9a84c, #9d7a2e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: #ffffff;
      line-height: 1.1;
    }

    .header-text p {
      font-size: 0.68rem;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ---- PDF Viewer ---- */
    .pdf-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
    }

    .pdf-label {
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .pdf-container {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(201, 168, 76, 0.25);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      min-height: calc(100vh - 140px);
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 140px);
      border: none;
      display: block;
    }

    /* Fallback message shown only if iframe fails */
    .pdf-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
    }

    .pdf-fallback .icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    .pdf-fallback p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #c9a84c, #9d7a2e);
      color: #1a1209;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(201, 168, 76, 0.4);
      transition: 0.3s;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.6);
    }

    /* Footer */
    footer {
      background: rgba(0, 0, 0, 0.35);
      border-top: 1px solid rgba(201, 168, 76, 0.15);
      text-align: center;
      padding: 14px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    /* Mobile: show download button prominently */
    @media (max-width: 768px) {
      .pdf-container {
        display: none;
      }

      .pdf-fallback {
        display: flex;
      }

      header {
        padding: 14px 20px;
      }

      .header-text h1 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo-circle">🍽️</div>
    <div class="header-text">
      <h1>Happy Da Punjab</h1>
      <p>Our Menu</p>
    </div>
  </header>

  <!-- PDF Viewer -->
  <div class="pdf-wrapper">
    <p class="pdf-label">📄 Restaurant Menu — Scroll to explore</p>

    <div class="pdf-container">
      <iframe src="Menu.pdf" title="Happy Da Punjab Menu" type="application/pdf"></iframe>
    </div>

    <!-- Mobile Fallback -->
    <div class="pdf-fallback">
      <div class="icon">🍛</div>
      <h2 style="font-family:'Playfair Display',serif;color:#c9a84c;font-size:1.4rem;">Our Menu</h2>
      <p>Tap the button below to view or download our full menu PDF.</p>
      <a href="Menu.pdf" download="HappyDaPunjab_Menu.pdf" class="btn-download">
        📥 Download Menu
      </a>
      <a href="Menu.pdf" target="_blank" class="btn-download"
        style="background:transparent;border:2px solid #c9a84c;color:#c9a84c;box-shadow:none;">
        👁 View Menu
      </a>
    </div>
  </div>

  <footer>
    © 2024 Happy Da Punjab. All Rights Reserved.
  </footer>

</body>

</html>
